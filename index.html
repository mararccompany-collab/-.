<<style>
  html, body { 
    margin: 0; 
    padding: 0; 
    background: #050510; 
    color: #fff; 
    font-family: sans-serif; 
    width: 100%; 
    min-height: 100vh; /* يسمح للصفحة بالتمدد لأسفل */
    overflow-x: hidden; /* يمنع التمرير العرضي المزعج فقط */
    overflow-y: auto;   /* يسمح بالتمرير لأسفل طبيعياً */
  }
  
  #root { 
    width: 100%; 
    min-height: 100vh; 
  }

  .preloader { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    width: 100%; 
    height: 100vh; /* شاشة كاملة وقت التحميل فقط */
    text-align: center; 
    padding: 20px; 
    box-sizing: border-box;
  }
  .preloader span { font-size: 48px; margin-bottom: 16px; }
  .preloader p { color: rgba(255,255,255,0.5); font-size: 14px; margin: 4px 0; }
  .preloader .spinner { width: 32px; height: 32px; border: 3px solid rgba(34,197,94,0.3); border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
